name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION_TAG: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be semver format (e.g. 1.0.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION_TAG already exists"
            exit 1
          fi

      - name: Create version tag on main
        run: |
          git tag "$VERSION_TAG"
          git push origin "$VERSION_TAG"

      - name: Promote main to prod
        run: |
          git push --force origin main:prod

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION_TAG" \
            --target main \
            --title "$VERSION_TAG" \
            --generate-notes

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref prod -f version=$VERSION_TAG
