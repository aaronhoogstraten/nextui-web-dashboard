name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. v1.0.0)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch Developer.pak
        run: sh scripts/fetch-developer-pak.sh
      - name: Resolve version
        run: echo "APP_VERSION=${{ inputs.version || 'dev' }}" >> "$GITHUB_ENV"
      - name: Write version file
        run: echo "{\"version\":\"$APP_VERSION\"}" > static/version.json
      - run: npm run build
        env:
          NODE_ENV: production
          CUSTOM_DOMAIN: true
          APP_VERSION: ${{ env.APP_VERSION }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
